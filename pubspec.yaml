name: santriku_app
description: "Aplikasi Mobile Pondok Pesantren - Santriku"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  excel: ^4.0.6
  path_provider: ^2.1.5
  http: ^1.6.0
  geolocator: ^11.1.0
  image_picker: ^1.2.1
  mobile_scanner: ^6.0.0
  qr_flutter: ^4.1.0
  permission_handler: ^11.3.1
  universal_html: ^2.3.0
  open_filex: ^4.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
